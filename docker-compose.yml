version: '3.8'

services:
  product-db:
    image: mongo:7
    container_name: product-db
    ports:
      - "27018:27017"
    volumes:
      - product_data:/data/db
    networks:
      - app-network

  order-db:
    image: mongo:7
    container_name: order-db
    ports:
      - "27020:27017"
    volumes:
      - order_data:/data/db
    networks:
      - app-network

  payment-db:
    image: mongo:7
    container_name: payment-db
    ports:
      - "27019:27017"
    volumes:
      - payment_data:/data/db
    networks:
      - app-network

  user-db:
    image: mongo:7
    container_name: user-db
    ports:
      - "27021:27017"
    volumes:
      - user_data:/data/db
    networks:
      - app-network

  product-service:
    build: ./product-service
    container_name: product-service
    expose:
      - "3001"
    depends_on:
      - product-db
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
    volumes:
      - product_uploads:/app/public/uploads
    networks:
      - app-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    depends_on:
      - order-db
    environment:
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:3001}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
    networks:
      - app-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3003:3003"
    depends_on:
      - payment-db
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3004}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMO}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-F8BBA842ECF85}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-K951B6PE1waDMi640xX08PD3vg6EkVlz}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-payWithMethod}
    networks:
      - app-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3005:3005"
    depends_on:
      - user-db
    networks:
      - app-network

  fe:
    build: ./fe
    container_name: fe
    ports:
      - "3004:3004"
    depends_on:
      - api-gateway
    networks:
      - app-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
      - payment-service
      - user-service
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
    networks:
      - app-network

volumes:
  product_data:
  order_data:
  payment_data:
  user_data:
  product_uploads:

networks:
  app-network:
    driver: bridge
