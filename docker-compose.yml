services:
  product-db:
    image: mongo:7
    container_name: product-db
    expose:
      - "27017"
    volumes:
      - product_data:/data/db
    networks:
      - app-network

  order-db:
    image: mongo:7
    container_name: order-db
    expose:
      - "27017"
    volumes:
      - order_data:/data/db
    networks:
      - app-network

  payment-db:
    image: mongo:7
    container_name: payment-db
    expose:
      - "27017"
    volumes:
      - payment_data:/data/db
    networks:
      - app-network

  user-db:
    image: mongo:7
    container_name: user-db
    expose:
      - "27017"
    volumes:
      - user_data:/data/db
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
    expose:
      - "1025"
    networks:
      - app-network

  product-service:
    build: ./product-service
    container_name: product-service
    expose:
      - "3001"
    depends_on:
      - product-db
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
    volumes:
      - product_uploads:/app/public/uploads
    networks:
      - app-network

  order-service:
    build: ./order-service
    container_name: order-service
    expose:
      - "3002"
    depends_on:
      - order-db
    environment:
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:3001}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
    networks:
      - app-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    expose:
      - "3003"
    depends_on:
      - payment-db
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3004}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-payWithMethod}
    networks:
      - app-network

  user-service:
    build: ./user-service
    container_name: user-service
    expose:
      - "3005"
    depends_on:
      - user-db
      - mailpit
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3004}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      GOOGLE_STATE_SECRET: ${GOOGLE_STATE_SECRET:-local-google-state-secret}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-30}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-ShopOnline <no-reply@shoponline.local>}
    networks:
      - app-network

  fe:
    build: ./fe
    container_name: fe
    ports:
      - "3004:3004"
    depends_on:
      - api-gateway
    networks:
      - app-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service
      - payment-service
      - user-service
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-product-token}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3004}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3004}
    networks:
      - app-network

volumes:
  product_data:
  order_data:
  payment_data:
  user_data:
  product_uploads:

networks:
  app-network:
    driver: bridge
