server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = / {
        try_files /pages/index.html =404;
    }

    location ~ ^/(.+\.html)$ {
        try_files /pages/$1 =404;
    }

    location /api/ {
        proxy_pass http://api-gateway:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://api-gateway:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
