<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | ShopOnline</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="topbar">
        <div class="brand-wrap">
            <a class="logo" href="/">ShopOnline</a>
            <p class="tagline">Mua sắm tiện lợi, giao hàng nhanh</p>
        </div>
        <ul class="nav-links">
            <li><a href="/">Trang chủ</a></li>
            <li><a href="cart.html">Giỏ hàng</a></li>
        </ul>
    </nav>

    <main class="login-page">
        <section class="login-wrapper">
            <div class="login-card">
                <p class="section-kicker">Tài khoản</p>
                <h2>Đăng nhập</h2>
                <p class="section-copy">Đăng nhập để mua hàng và sử dụng hệ thống.</p>

                <form id="login-form" class="login-form">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" placeholder="Nhập username" required>

                    <label for="password">Mật khẩu</label>
                    <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" required>

                    <button type="submit" class="checkout-button">Đăng nhập</button>
                </form>

                <p id="login-message" class="login-message"></p>

                <div class="login-note">
                    <span>Tài khoản demo:</span>
                    <strong>admin / 123</strong><br>
                    <strong>user / 123</strong>
                </div>
            </div>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
