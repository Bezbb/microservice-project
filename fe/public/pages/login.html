<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | ShopOnline</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body data-auth-page="login">
    <nav class="topbar">
        <div class="brand-wrap">
            <a class="logo" href="/">ShopOnline</a>
            <p class="tagline">Mua sắm tiện lợi, giao hàng nhanh</p>
        </div>

        <ul class="nav-links">
            <li><a href="/">Trang chủ</a></li>
            <li><a href="/cart.html">Giỏ hàng</a></li>
            <li id="auth-nav-slot" class="auth-slot"></li>
        </ul>
    </nav>

    <main class="login-page">
        <section class="auth-shell single-auth-shell">
            <div class="login-card">
                <p class="section-kicker">Đăng nhập</p>
                <h2>Chào mừng quay lại</h2>
                <p class="subtext">Nhập email và mật khẩu để tiếp tục.</p>

                <a href="#" id="google-login-button" class="oauth-button" aria-label="Đăng nhập bằng Google">
                    <span class="oauth-icon">G</span>
                    <span>Tiếp tục với Google</span>
                </a>

                <div class="auth-divider"><span>hoặc</span></div>

                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="ban@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Mật khẩu</label>
                        <input type="password" id="login-password" placeholder="Nhập mật khẩu" required>
                    </div>

                    <button type="submit" class="primary-btn">Đăng nhập</button>
                </form>

                <p id="login-message" class="login-message"></p>
                <details class="forgot-panel">
                    <summary>Quên mật khẩu?</summary>
                    <form id="forgot-password-form" class="login-form compact-form">
                        <div class="form-group">
                            <label for="forgot-email">Email đăng ký</label>
                            <input type="email" id="forgot-email" placeholder="ban@example.com">
                        </div>
                        <button type="submit" class="secondary-btn full-width-btn">Gửi link đặt lại</button>
                    </form>
                    <p id="forgot-message" class="login-message"></p>
                </details>
                <p class="auth-switch">
                    Chưa có tài khoản?
                    <a class="inline-link" href="/register.html">Đăng ký ngay</a>
                </p>
            </div>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
