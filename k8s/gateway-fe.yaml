apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: shoponline-api-gateway:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: INTERNAL_SERVICE_TOKEN
          value: "local-dev-product-token"
        - name: FRONTEND_URL
          value: "http://192.168.26.99:30004"
        - name: CORS_ORIGINS
          value: "http://192.168.26.99:30004,http://localhost:3004"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shoponline
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
      - name: fe
        image: shoponline-fe:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: shoponline
spec:
  type: NodePort
  selector:
    app: fe
  ports:
  - port: 3004
    targetPort: 3004
    nodePort: 30004
