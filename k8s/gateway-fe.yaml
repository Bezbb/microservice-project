apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: shoponline-api-gateway:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: INTERNAL_SERVICE_TOKEN
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: FRONTEND_URL
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: CORS_ORIGINS
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shoponline
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
      - name: fe
        image: shoponline-fe:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
        env:
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: API_BASE_URL
        - name: API_PROXY_TARGET
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: API_PROXY_TARGET
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: shoponline
spec:
  type: NodePort
  selector:
    app: fe
  ports:
  - port: 3004
    targetPort: 3004
    nodePort: 30004
