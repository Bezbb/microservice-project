apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-db
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-db
  template:
    metadata:
      labels:
        app: product-db
    spec:
      containers:
      - name: product-db
        image: mongo:7
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: product-db
  namespace: shoponline
spec:
  selector:
    app: product-db
  ports:
  - port: 27017
    targetPort: 27017
