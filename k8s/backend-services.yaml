apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: shoponline-product-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: INTERNAL_SERVICE_TOKEN
          value: "local-dev-product-token"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shoponline
spec:
  selector:
    app: product-service
  ports:
  - port: 3001
    targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: shoponline-order-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:3001"
        - name: INTERNAL_SERVICE_TOKEN
          value: "local-dev-product-token"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shoponline
spec:
  selector:
    app: order-service
  ports:
  - port: 3002
    targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: shoponline-payment-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        - name: INTERNAL_SERVICE_TOKEN
          value: "local-dev-product-token"
        - name: PUBLIC_API_BASE_URL
          value: "http://api-gateway:3000"
        - name: FRONTEND_URL
          value: "http://fe:3004"
        - name: MOMO_ENDPOINT
          value: "https://test-payment.momo.vn/v2/gateway/api/create"
        - name: MOMO_PARTNER_CODE
          value: ""
        - name: MOMO_ACCESS_KEY
          value: ""
        - name: MOMO_SECRET_KEY
          value: ""
        - name: MOMO_REQUEST_TYPE
          value: "payWithMethod"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: shoponline
spec:
  selector:
    app: payment-service
  ports:
  - port: 3003
    targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: shoponline-user-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3005
        env:
        - name: FRONTEND_URL
          value: "http://fe:3004"
        - name: PUBLIC_API_BASE_URL
          value: "http://api-gateway:3000"
        - name: GOOGLE_CLIENT_ID
          value: ""
        - name: GOOGLE_CLIENT_SECRET
          value: ""
        - name: GOOGLE_REDIRECT_URI
          value: "http://api-gateway:3000/api/auth/google/callback"
        - name: GOOGLE_STATE_SECRET
          value: "local-google-state-secret"
        - name: PASSWORD_RESET_TTL_MINUTES
          value: "30"
        - name: SMTP_HOST
          value: "mailpit"
        - name: SMTP_PORT
          value: "1025"
        - name: SMTP_SECURE
          value: "false"
        - name: SMTP_USER
          value: ""
        - name: SMTP_PASS
          value: ""
        - name: SMTP_FROM
          value: "ShopOnline <no-reply@shoponline.local>"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shoponline
spec:
  selector:
    app: user-service
  ports:
  - port: 3005
    targetPort: 3005
