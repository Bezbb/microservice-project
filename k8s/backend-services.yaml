apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: shoponline-product-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: INTERNAL_SERVICE_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shoponline
spec:
  selector:
    app: product-service
  ports:
  - port: 3001
    targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: shoponline-order-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: PRODUCT_SERVICE_URL
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: INTERNAL_SERVICE_TOKEN
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shoponline
spec:
  selector:
    app: order-service
  ports:
  - port: 3002
    targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: shoponline-payment-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: INTERNAL_SERVICE_TOKEN
        - name: PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: PUBLIC_API_BASE_URL
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: FRONTEND_URL
        - name: MOMO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: MOMO_ENDPOINT
        - name: MOMO_PARTNER_CODE
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: MOMO_PARTNER_CODE
              optional: true
        - name: MOMO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: MOMO_ACCESS_KEY
              optional: true
        - name: MOMO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: MOMO_SECRET_KEY
              optional: true
        - name: MOMO_REQUEST_TYPE
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: MOMO_REQUEST_TYPE
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: shoponline
spec:
  selector:
    app: payment-service
  ports:
  - port: 3003
    targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shoponline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: shoponline-user-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3005
        env:
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: FRONTEND_URL
        - name: PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: PUBLIC_API_BASE_URL
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: GOOGLE_CLIENT_ID
              optional: true
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: GOOGLE_CLIENT_SECRET
              optional: true
        - name: GOOGLE_REDIRECT_URI
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: GOOGLE_REDIRECT_URI
        - name: GOOGLE_AUTH_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: GOOGLE_AUTH_URL
        - name: GOOGLE_TOKEN_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: GOOGLE_TOKEN_URL
        - name: GOOGLE_USERINFO_URL
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: GOOGLE_USERINFO_URL
        - name: GOOGLE_STATE_SECRET
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: GOOGLE_STATE_SECRET
              optional: true
        - name: DEFAULT_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: DEFAULT_ADMIN_EMAIL
        - name: DEFAULT_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: DEFAULT_ADMIN_PASSWORD
        - name: PASSWORD_RESET_TTL_MINUTES
          value: "30"
        - name: SMTP_HOST
          value: "mailpit"
        - name: SMTP_PORT
          value: "1025"
        - name: SMTP_SECURE
          value: "false"
        - name: SMTP_USER
          value: ""
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: shoponline-secrets
              key: SMTP_PASS
              optional: true
        - name: SMTP_FROM
          valueFrom:
            configMapKeyRef:
              name: shoponline-runtime-config
              key: SMTP_FROM
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shoponline
spec:
  selector:
    app: user-service
  ports:
  - port: 3005
    targetPort: 3005
