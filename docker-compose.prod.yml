services:
  product-db:
    image: mongo:7
    container_name: product-db
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - product_data:/data/db
    networks:
      - app-network

  order-db:
    image: mongo:7
    container_name: order-db
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - order_data:/data/db
    networks:
      - app-network

  payment-db:
    image: mongo:7
    container_name: payment-db
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - payment_data:/data/db
    networks:
      - app-network

  user-db:
    image: mongo:7
    container_name: user-db
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - user_data:/data/db
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    expose:
      - "1025"
    networks:
      - app-network

  product-service:
    build: ./product-service
    container_name: product-service
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      - product-db
    environment:
      NODE_ENV: production
      PRODUCT_MONGODB_URI: ${PRODUCT_MONGODB_URI:?Set PRODUCT_MONGODB_URI in .env}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - product_uploads:/app/public/uploads
    networks:
      - app-network

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    expose:
      - "3002"
    depends_on:
      - order-db
      - product-service
    environment:
      NODE_ENV: production
      ORDER_MONGODB_URI: ${ORDER_MONGODB_URI:?Set ORDER_MONGODB_URI in .env}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:?Set PRODUCT_SERVICE_URL in .env}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    networks:
      - app-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    restart: unless-stopped
    expose:
      - "3003"
    depends_on:
      - payment-db
      - order-service
    environment:
      NODE_ENV: production
      PAYMENT_MONGODB_URI: ${PAYMENT_MONGODB_URI:?Set PAYMENT_MONGODB_URI in .env}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:?Set ORDER_SERVICE_URL in .env}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:?Set MOMO_ENDPOINT in .env}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-payWithMethod}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-}
    networks:
      - app-network

  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    expose:
      - "3005"
    depends_on:
      - user-db
      - mailpit
    environment:
      NODE_ENV: production
      USER_MONGODB_URI: ${USER_MONGODB_URI:?Set USER_MONGODB_URI in .env}
      FRONTEND_URL: ${FRONTEND_URL:-}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_STATE_SECRET: ${GOOGLE_STATE_SECRET:-}
      GOOGLE_AUTH_URL: ${GOOGLE_AUTH_URL:?Set GOOGLE_AUTH_URL in .env}
      GOOGLE_TOKEN_URL: ${GOOGLE_TOKEN_URL:?Set GOOGLE_TOKEN_URL in .env}
      GOOGLE_USERINFO_URL: ${GOOGLE_USERINFO_URL:?Set GOOGLE_USERINFO_URL in .env}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-30}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?Set DEFAULT_ADMIN_EMAIL in .env}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in .env}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Shop Admin}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    networks:
      - app-network

  fe:
    build: ./fe
    container_name: fe
    ports:
      - "${FE_PORT:-80}:80"
    depends_on:
      - api-gateway
    networks:
      - app-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    depends_on:
      - product-service
      - order-service
      - payment-service
      - user-service
    environment:
      NODE_ENV: production
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?Set INTERNAL_SERVICE_TOKEN in .env}
      FRONTEND_URL: ${FRONTEND_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      USER_SERVICE_URL: ${USER_SERVICE_URL:?Set USER_SERVICE_URL in .env}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:?Set PRODUCT_SERVICE_URL in .env}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:?Set ORDER_SERVICE_URL in .env}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:?Set PAYMENT_SERVICE_URL in .env}
    networks:
      - app-network

volumes:
  product_data:
  order_data:
  payment_data:
  user_data:
  product_uploads:

networks:
  app-network:
    driver: bridge
